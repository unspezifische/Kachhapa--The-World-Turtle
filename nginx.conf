user ijohnson;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  client_max_body_size 2000M;

  proxy_headers_hash_max_size 1024;
  proxy_headers_hash_bucket_size 128;

  upstream backend {
    server unix:/home/ijohnson/Kachhapa/Flask/myapp.sock;
  }

  upstream wiki {
    server 127.0.0.1:5000;
  }

  # upstream admin {
  #   server 127.0.0.1:5000;
  # }

  # tools.raspberrypi.local
  server {
    listen 80;
    server_name tools.raspberrypi.local;

    root /var/www/5etools-src;
    index index.html;

    location / {
      try_files $uri $uri/ =404;
    }
  }

  # App.raspberrypi.local
  server {
    listen 80;
    server_name app.raspberrypi.local;

    location / {
      root /home/ijohnson/Kachhapa/webapp/build;
      index index.html;
      try_files $uri $uri/ /index.html;  # fallback to index.html
    }

    location /wiki/ {
      proxy_pass http://wiki/;
      include proxy_params;
      add_header 'Access-Control-Allow-Origin' '*';
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, HEAD';
    }

    location /5etools/ {
      alias /var/www/5etools-src/;
      index index.html;
      try_files $uri $uri/ =404;
    }

    location /admin/ {
      proxy_pass http://backend;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dashboard/ {
      proxy_pass http://backend;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
      alias /home/ijohnson/Kachhapa/Flask/media/;
      access_log off;
      expires 7d;
      add_header Cache-Control "public, max-age=604800";
      try_files $uri =404;
    }

    # Directly proxy /api and /socket.io without redirects to avoid websocket handshake issues

    location /api/ {
      access_log /var/log/nginx/api_access.log;
      error_log  /var/log/nginx/api_error.log debug;

      proxy_pass http://unix:/home/ijohnson/Kachhapa/Flask/myapp.sock:/api/;
      include proxy_params;

      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, HEAD' always;
      add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;

      # OPTIONS preflight
      if ($request_method = OPTIONS) { return 204; }
    }

    location /socket.io/ {
      access_log /var/log/nginx/ws_access.log;
      error_log  /var/log/nginx/ws_error.log;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;

      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_read_timeout 86400;
      proxy_send_timeout 86400;
      proxy_buffering off;

      proxy_pass http://unix:/home/ijohnson/Kachhapa/Flask/myapp.sock:/socket.io/;
      include proxy_params;

      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, HEAD' always;
      add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;

      if ($request_method = OPTIONS) { return 204; }
    }
  }
  
  # raspberrypi.local
  server {
    listen 80;
    server_name raspberrypi.local;

    location / {
      root /home/ijohnson/Kachhapa/webapp/build;
