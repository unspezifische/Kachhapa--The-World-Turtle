services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - Kachhapa-network

  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    environment:
      RABBITMQ_ERLANG_COOKIE: "a-very-long-random-string-at-least-20-characters"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - Kachhapa-network

  flask:
    build:
      context: .
      dockerfile: Flask/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./Flask:/app
      - myapp_socket:/tmp
    ports:
      - "5001:5000"
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672//
    networks:
      - Kachhapa-network

  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - flask
    volumes:
      - myapp_socket:/tmp
    networks:
      - Kachhapa-network

volumes:
  postgres_data:
  myapp_socket:
  rabbitmq_data:

networks:
  Kachhapa-network: